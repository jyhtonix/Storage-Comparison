<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="620" fill="#0f1923" rx="12"/>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#c8a0ff">Optical Disk (CD/DVD/Blu-ray)</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#8899aa">Architecture &amp; Block Diagram</text>

  <defs>
    <marker id="a1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#c8a0ff"/></marker>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#a080dd"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5bc8ac"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0a050"/></marker>
    <marker id="a5" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#cc5566"/></marker>
    <radialGradient id="discGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1a6a"/>
      <stop offset="60%" stop-color="#1e1050"/>
      <stop offset="100%" stop-color="#4a30a0"/>
    </radialGradient>
  </defs>

  <!-- Divider -->
  <line x1="460" y1="75" x2="460" y2="590" stroke="#2a3f55" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ===== PHYSICAL ARCHITECTURE (left) ===== -->
  <text x="225" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#aaccee">Physical Architecture</text>

  <!-- Disc -->
  <ellipse cx="225" cy="270" rx="145" ry="145" fill="url(#discGrad)" stroke="#7050c0" stroke-width="2.5"/>
  <!-- Iridescent rings (tracks representation) -->
  <ellipse cx="225" cy="270" rx="120" ry="120" fill="none" stroke="#9060d8" stroke-width="1" stroke-dasharray="3,2"/>
  <ellipse cx="225" cy="270" rx="100" ry="100" fill="none" stroke="#7040b8" stroke-width="1" stroke-dasharray="3,2"/>
  <ellipse cx="225" cy="270" rx="80" ry="80" fill="none" stroke="#9080d0" stroke-width="1"/>
  <ellipse cx="225" cy="270" rx="55" ry="55" fill="none" stroke="#6040a0" stroke-width="1"/>
  <!-- Hub hole -->
  <circle cx="225" cy="270" r="18" fill="#0f1923" stroke="#7050c0" stroke-width="2"/>
  <!-- Spiral track label -->
  <text x="290" y="215" font-size="11" fill="#aa88ee">Spiral track</text>
  <line x1="285" y1="218" x2="270" y2="230" stroke="#aa88ee" stroke-width="1"/>
  <!-- Label area -->
  <ellipse cx="225" cy="270" rx="40" ry="40" fill="#1a0f3a" stroke="#5030a0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="225" y="274" text-anchor="middle" font-size="9" fill="#7060b0">Label</text>
  <text x="225" y="285" text-anchor="middle" font-size="9" fill="#7060b0">Area</text>

  <!-- Laser pickup -->
  <rect x="96" y="350" width="90" height="30" rx="4" fill="#1a0f3a" stroke="#c8a0ff" stroke-width="1.5"/>
  <text x="141" y="362" text-anchor="middle" font-size="10" fill="#c8a0ff">Laser Pickup</text>
  <text x="141" y="374" text-anchor="middle" font-size="9" fill="#8899aa">(OPU)</text>
  <!-- beam line -->
  <line x1="141" y1="350" x2="200" y2="310" stroke="#c8a0ff" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Spindle motor (disc) -->
  <rect x="185" y="420" width="80" height="28" rx="4" fill="#0d1a2a" stroke="#9060d0" stroke-width="1.5"/>
  <text x="225" y="438" text-anchor="middle" font-size="10" fill="#9060d0">Spindle Motor</text>

  <!-- Sled motor -->
  <rect x="80" y="420" width="90" height="28" rx="4" fill="#0d1a2a" stroke="#9060d0" stroke-width="1.5"/>
  <text x="125" y="438" text-anchor="middle" font-size="10" fill="#9060d0">Sled Motor</text>

  <!-- Photodetector -->
  <rect x="280" y="350" width="90" height="30" rx="4" fill="#1a0f3a" stroke="#5bc8ac" stroke-width="1.5"/>
  <text x="325" y="362" text-anchor="middle" font-size="10" fill="#5bc8ac">Photodetector</text>
  <text x="325" y="374" text-anchor="middle" font-size="9" fill="#8899aa">Array (PDIC)</text>
  <line x1="295" y1="350" x2="260" y2="310" stroke="#5bc8ac" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="225" y="470" text-anchor="middle" font-size="11" fill="#556677">— Disc spins at CLV (constant linear velocity) —</text>

  <!-- ===== BLOCK DIAGRAM (right) ===== -->
  <text x="672" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#aaccee">Block Diagram</text>

  <!-- Host Interface -->
  <rect x="572" y="105" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#c8a0ff" stroke-width="2"/>
  <text x="672" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#c8a0ff">Host Interface</text>
  <text x="672" y="140" text-anchor="middle" font-size="10" fill="#8899aa">SATA / USB / IDE</text>

  <line x1="672" y1="145" x2="672" y2="175" stroke="#c8a0ff" stroke-width="2" marker-end="url(#a1)"/>

  <!-- System Controller -->
  <rect x="572" y="175" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#a080dd" stroke-width="2"/>
  <text x="672" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#a080dd">System Controller (DSP)</text>
  <text x="672" y="209" text-anchor="middle" font-size="10" fill="#8899aa">Servo, EFM decode, error correction</text>

  <line x1="672" y1="215" x2="672" y2="245" stroke="#a080dd" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Data Buffer -->
  <rect x="572" y="245" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#5bc8ac" stroke-width="2"/>
  <text x="672" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#5bc8ac">Data Buffer (DRAM)</text>
  <text x="672" y="279" text-anchor="middle" font-size="10" fill="#8899aa">Read-ahead cache, spin-up buffer</text>

  <line x1="672" y1="285" x2="672" y2="315" stroke="#5bc8ac" stroke-width="2" marker-end="url(#a3)"/>

  <!-- RF Amplifier / Signal Processing -->
  <rect x="572" y="315" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#e0a050" stroke-width="2"/>
  <text x="672" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a050">RF Amp &amp; Signal Processor</text>
  <text x="672" y="349" text-anchor="middle" font-size="10" fill="#8899aa">EFM/EFMPlus demodulation, CIRC</text>

  <line x1="672" y1="355" x2="672" y2="385" stroke="#e0a050" stroke-width="2" marker-end="url(#a4)"/>

  <!-- Laser / OPU -->
  <rect x="572" y="385" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#cc5566" stroke-width="2"/>
  <text x="672" y="405" text-anchor="middle" font-size="13" font-weight="600" fill="#cc5566">Laser Diode / OPU</text>
  <text x="672" y="419" text-anchor="middle" font-size="10" fill="#8899aa">780 nm (CD) / 650 nm (DVD) / 405 nm (BD)</text>

  <line x1="672" y1="425" x2="672" y2="455" stroke="#cc5566" stroke-width="2" marker-end="url(#a5)"/>

  <!-- Optical Media -->
  <rect x="572" y="455" width="200" height="40" rx="6" fill="#1a0f3a" stroke="#7050c0" stroke-width="2"/>
  <text x="672" y="475" text-anchor="middle" font-size="13" font-weight="600" fill="#9070d8">Optical Media</text>
  <text x="672" y="489" text-anchor="middle" font-size="10" fill="#8899aa">Pits &amp; lands on polycarbonate substrate</text>

  <!-- Servo -->
  <rect x="572" y="520" width="200" height="32" rx="6" fill="#0d1a2a" stroke="#556677" stroke-width="1.5"/>
  <text x="672" y="540" text-anchor="middle" font-size="12" fill="#778899">Servo System (Focus / Tracking / Sled)</text>

  <text x="450" y="610" text-anchor="middle" font-size="11" fill="#445566">© Storage Architecture Reference — Optical Disk</text>
</svg>
