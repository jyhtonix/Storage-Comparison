<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="640" fill="#0f1923" rx="12"/>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#50e0a0">Solid State Drive (SSD)</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#8899aa">Architecture &amp; Block Diagram (SATA/AHCI)</text>

  <defs>
    <marker id="s1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#50e0a0"/></marker>
    <marker id="s2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#40c090"/></marker>
    <marker id="s3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#60c6ff"/></marker>
    <marker id="s4" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#e0a050"/></marker>
    <marker id="s5" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#cc5566"/></marker>
  </defs>

  <line x1="460" y1="75" x2="460" y2="605" stroke="#2a3f55" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ===== PHYSICAL ARCHITECTURE (left) ===== -->
  <text x="225" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#aaccee">Physical Architecture (PCB View)</text>

  <!-- PCB outline -->
  <rect x="70" y="105" width="310" height="450" rx="8" fill="#0a1a10" stroke="#1a5a30" stroke-width="2"/>
  <text x="225" y="130" text-anchor="middle" font-size="12" fill="#2a7a40">PCB (Printed Circuit Board)</text>

  <!-- NAND Flash chips (2x4 grid) -->
  <!-- Row 1 -->
  <rect x="90" y="145" width="120" height="70" rx="5" fill="#0f2a1a" stroke="#50e0a0" stroke-width="2"/>
  <text x="150" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#50e0a0">NAND Flash</text>
  <text x="150" y="191" text-anchor="middle" font-size="9" fill="#8899aa">Die #1 (TLC/QLC)</text>
  <!-- chip pin lines -->
  <line x1="90" y1="160" x2="80" y2="160" stroke="#1a6a30" stroke-width="1"/>
  <line x1="90" y1="170" x2="80" y2="170" stroke="#1a6a30" stroke-width="1"/>
  <line x1="90" y1="180" x2="80" y2="180" stroke="#1a6a30" stroke-width="1"/>
  <line x1="90" y1="190" x2="80" y2="190" stroke="#1a6a30" stroke-width="1"/>

  <rect x="240" y="145" width="120" height="70" rx="5" fill="#0f2a1a" stroke="#50e0a0" stroke-width="2"/>
  <text x="300" y="177" text-anchor="middle" font-size="11" font-weight="600" fill="#50e0a0">NAND Flash</text>
  <text x="300" y="191" text-anchor="middle" font-size="9" fill="#8899aa">Die #2</text>

  <!-- Row 2 -->
  <rect x="90" y="235" width="120" height="70" rx="5" fill="#0f2a1a" stroke="#50e0a0" stroke-width="2"/>
  <text x="150" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#50e0a0">NAND Flash</text>
  <text x="150" y="281" text-anchor="middle" font-size="9" fill="#8899aa">Die #3</text>

  <rect x="240" y="235" width="120" height="70" rx="5" fill="#0f2a1a" stroke="#50e0a0" stroke-width="2"/>
  <text x="300" y="267" text-anchor="middle" font-size="11" font-weight="600" fill="#50e0a0">NAND Flash</text>
  <text x="300" y="281" text-anchor="middle" font-size="9" fill="#8899aa">Die #4</text>

  <!-- Controller -->
  <rect x="130" y="330" width="190" height="80" rx="6" fill="#0d2535" stroke="#60c6ff" stroke-width="2.5"/>
  <text x="225" y="360" text-anchor="middle" font-size="14" font-weight="700" fill="#60c6ff">SSD Controller</text>
  <text x="225" y="376" text-anchor="middle" font-size="10" fill="#8899aa">Flash Translation Layer (FTL)</text>
  <text x="225" y="390" text-anchor="middle" font-size="10" fill="#8899aa">Wear leveling, GC, ECC engine</text>

  <!-- DRAM Cache -->
  <rect x="90" y="440" width="120" height="55" rx="5" fill="#0d1a2a" stroke="#e0a050" stroke-width="2"/>
  <text x="150" y="462" text-anchor="middle" font-size="11" font-weight="600" fill="#e0a050">DRAM Cache</text>
  <text x="150" y="476" text-anchor="middle" font-size="9" fill="#8899aa">LPDDR4 / DDR4</text>
  <text x="150" y="489" text-anchor="middle" font-size="9" fill="#8899aa">FTL mapping table</text>

  <!-- SATA connector -->
  <rect x="240" y="450" width="120" height="38" rx="4" fill="#112030" stroke="#7ab8e0" stroke-width="2"/>
  <text x="300" y="469" text-anchor="middle" font-size="11" fill="#7ab8e0">SATA Connector</text>
  <text x="300" y="481" text-anchor="middle" font-size="9" fill="#8899aa">6 Gbps</text>
  <!-- pin teeth -->
  <rect x="250" y="488" width="8" height="8" fill="#7ab8e0" rx="1"/>
  <rect x="262" y="488" width="8" height="8" fill="#7ab8e0" rx="1"/>
  <rect x="274" y="488" width="8" height="8" fill="#7ab8e0" rx="1"/>
  <rect x="286" y="488" width="8" height="8" fill="#7ab8e0" rx="1"/>
  <rect x="298" y="488" width="8" height="8" fill="#7ab8e0" rx="1"/>

  <!-- Power -->
  <rect x="130" y="525" width="190" height="22" rx="4" fill="#0d1a2a" stroke="#556677" stroke-width="1.5"/>
  <text x="225" y="540" text-anchor="middle" font-size="11" fill="#778899">Power Regulation (3.3V / 5V)</text>

  <!-- connection lines on PCB -->
  <line x1="150" y1="215" x2="200" y2="330" stroke="#2a6a40" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="215" x2="260" y2="330" stroke="#2a6a40" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="150" y1="305" x2="200" y2="330" stroke="#2a6a40" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="300" y1="305" x2="260" y2="330" stroke="#2a6a40" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="190" y1="410" x2="170" y2="440" stroke="#2a6080" stroke-width="1.5"/>
  <line x1="265" y1="410" x2="290" y2="450" stroke="#2a6080" stroke-width="1.5"/>

  <!-- ===== BLOCK DIAGRAM (right) ===== -->
  <text x="672" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#aaccee">Block Diagram</text>

  <rect x="572" y="105" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#50e0a0" stroke-width="2"/>
  <text x="672" y="125" text-anchor="middle" font-size="13" font-weight="600" fill="#50e0a0">Host Interface</text>
  <text x="672" y="140" text-anchor="middle" font-size="10" fill="#8899aa">SATA 6Gbps (AHCI protocol)</text>

  <line x1="672" y1="145" x2="672" y2="175" stroke="#50e0a0" stroke-width="2" marker-end="url(#s1)"/>

  <rect x="572" y="175" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#40c090" stroke-width="2"/>
  <text x="672" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#40c090">SSD Controller SoC</text>
  <text x="672" y="209" text-anchor="middle" font-size="10" fill="#8899aa">ARM core, FTL, ECC (LDPC/BCH)</text>

  <!-- Side branch: DRAM Cache -->
  <line x1="572" y1="195" x2="520" y2="195" stroke="#e0a050" stroke-width="1.5"/>
  <rect x="462" y="178" width="58" height="35" rx="4" fill="#0d1a2a" stroke="#e0a050" stroke-width="1.5"/>
  <text x="491" y="195" text-anchor="middle" font-size="9" fill="#e0a050">DRAM</text>
  <text x="491" y="207" text-anchor="middle" font-size="9" fill="#8899aa">Cache</text>

  <line x1="672" y1="215" x2="672" y2="245" stroke="#40c090" stroke-width="2" marker-end="url(#s2)"/>

  <rect x="572" y="245" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#60c6ff" stroke-width="2"/>
  <text x="672" y="265" text-anchor="middle" font-size="13" font-weight="600" fill="#60c6ff">Flash Translation Layer</text>
  <text x="672" y="279" text-anchor="middle" font-size="10" fill="#8899aa">LBA→PBA map, wear leveling, GC</text>

  <line x1="672" y1="285" x2="672" y2="315" stroke="#60c6ff" stroke-width="2" marker-end="url(#s3)"/>

  <rect x="572" y="315" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#e0a050" stroke-width="2"/>
  <text x="672" y="335" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a050">ECC Engine</text>
  <text x="672" y="349" text-anchor="middle" font-size="10" fill="#8899aa">LDPC / BCH error correction</text>

  <line x1="672" y1="355" x2="672" y2="385" stroke="#e0a050" stroke-width="2" marker-end="url(#s4)"/>

  <rect x="572" y="385" width="200" height="40" rx="6" fill="#0d1a2a" stroke="#cc5566" stroke-width="2"/>
  <text x="672" y="405" text-anchor="middle" font-size="13" font-weight="600" fill="#cc5566">NAND Flash Array</text>
  <text x="672" y="419" text-anchor="middle" font-size="10" fill="#8899aa">SLC / MLC / TLC / QLC cells</text>

  <line x1="672" y1="425" x2="672" y2="455" stroke="#cc5566" stroke-width="2" marker-end="url(#s5)"/>

  <!-- NAND details -->
  <rect x="562" y="455" width="220" height="70" rx="6" fill="#0f2a1a" stroke="#50e0a0" stroke-width="2"/>
  <text x="672" y="475" text-anchor="middle" font-size="12" font-weight="600" fill="#50e0a0">NAND Cell Structure</text>
  <text x="672" y="491" text-anchor="middle" font-size="10" fill="#8899aa">Block → Page → Cell (floating gate / CTF)</text>
  <text x="672" y="505" text-anchor="middle" font-size="10" fill="#8899aa">Erase: block | Write: page | Read: page</text>
  <text x="672" y="519" text-anchor="middle" font-size="10" fill="#8899aa">Program/Erase: ~100K (SLC) → ~1K (QLC)</text>

  <rect x="572" y="548" width="200" height="32" rx="6" fill="#0d1a2a" stroke="#556677" stroke-width="1.5"/>
  <text x="672" y="568" text-anchor="middle" font-size="12" fill="#778899">Power Loss Protection (optional cap)</text>

  <text x="450" y="625" text-anchor="middle" font-size="11" fill="#445566">© Storage Architecture Reference — SSD</text>
</svg>
