<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#0f1923" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#60c6ff">Hard Disk Drive (HDD)</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#8899aa">Architecture &amp; Block Diagram</text>

  <!-- ===== ARCHITECTURE DIAGRAM (left half) ===== -->
  <text x="225" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#aaccee">Physical Architecture</text>

  <!-- Platter group -->
  <!-- Platter 1 (back) -->
  <ellipse cx="225" cy="290" rx="120" ry="30" fill="none" stroke="#334455" stroke-width="2"/>
  <rect x="105" y="260" width="240" height="60" fill="#1a2a3a" stroke="#334455" stroke-width="1"/>
  <ellipse cx="225" cy="320" rx="120" ry="30" fill="#1e3248" stroke="#3a6080" stroke-width="2"/>
  <!-- Platter 2 (middle) -->
  <rect x="105" y="225" width="240" height="60" fill="#1a2a3a" stroke="#334455" stroke-width="1"/>
  <ellipse cx="225" cy="285" rx="120" ry="30" fill="#1e3248" stroke="#3a6080" stroke-width="2"/>
  <!-- Platter 3 (front) -->
  <rect x="105" y="195" width="240" height="55" fill="#1a2a3a" stroke="#334455" stroke-width="1"/>
  <ellipse cx="225" cy="250" rx="120" ry="30" fill="#1e3248" stroke="#4a80b0" stroke-width="2.5"/>
  <!-- Platter surface tracks -->
  <ellipse cx="225" cy="250" rx="90" ry="22" fill="none" stroke="#2a4a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <ellipse cx="225" cy="250" rx="60" ry="15" fill="none" stroke="#2a4a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <ellipse cx="225" cy="250" rx="30" ry="8" fill="none" stroke="#2a4a6a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Spindle -->
  <ellipse cx="225" cy="250" rx="10" ry="4" fill="#60c6ff"/>
  <!-- Platter labels -->
  <text x="318" y="254" font-size="11" fill="#8899aa">Platter (magnetic disk)</text>
  <text x="318" y="270" font-size="11" fill="#8899aa">Read/write tracks</text>

  <!-- Read/Write Arm -->
  <line x1="225" y1="250" x2="350" y2="190" stroke="#60c6ff" stroke-width="2.5"/>
  <circle cx="350" cy="190" r="6" fill="#60c6ff"/>
  <text x="355" y="188" font-size="11" fill="#60c6ff">R/W Head</text>
  <!-- Actuator arm pivot -->
  <circle cx="320" cy="380" r="10" fill="#2a4060" stroke="#60c6ff" stroke-width="2"/>
  <line x1="320" y1="380" x2="350" y2="190" stroke="#7ab8e0" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="330" y="400" font-size="11" fill="#7ab8e0">Actuator</text>
  <text x="330" y="413" font-size="11" fill="#7ab8e0">Arm</text>

  <!-- Spindle Motor label -->
  <rect x="155" y="345" width="140" height="28" rx="4" fill="#0d2035" stroke="#3a6080" stroke-width="1.5"/>
  <text x="225" y="363" text-anchor="middle" font-size="12" fill="#aaccee">Spindle Motor (5400–7200 RPM)</text>

  <!-- Voice Coil -->
  <rect x="295" y="435" width="110" height="28" rx="4" fill="#0d2035" stroke="#3a6080" stroke-width="1.5"/>
  <text x="350" y="453" text-anchor="middle" font-size="12" fill="#aaccee">Voice Coil Actuator</text>

  <!-- PCB label -->
  <rect x="130" y="440" width="130" height="28" rx="4" fill="#1a2535" stroke="#60c6ff" stroke-width="1.5"/>
  <text x="195" y="458" text-anchor="middle" font-size="12" fill="#60c6ff">Controller PCB</text>

  <!-- Case outline hint -->
  <rect x="95" y="155" width="260" height="310" rx="8" fill="none" stroke="#2a3f55" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="225" y="490" text-anchor="middle" font-size="11" fill="#556677">Sealed Enclosure</text>

  <!-- ===== BLOCK DIAGRAM (right half) ===== -->
  <text x="672" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#aaccee">Block Diagram</text>

  <!-- Host Interface -->
  <rect x="572" y="105" width="200" height="40" rx="6" fill="#0d2035" stroke="#60c6ff" stroke-width="2"/>
  <text x="672" y="130" text-anchor="middle" font-size="13" font-weight="600" fill="#60c6ff">Host Interface</text>
  <text x="672" y="143" text-anchor="middle" font-size="10" fill="#8899aa">(SATA / SAS)</text>

  <!-- Arrow down -->
  <line x1="672" y1="148" x2="672" y2="180" stroke="#60c6ff" stroke-width="2" marker-end="url(#arr)"/>

  <!-- HDC -->
  <rect x="572" y="180" width="200" height="40" rx="6" fill="#0d2035" stroke="#7ab8e0" stroke-width="2"/>
  <text x="672" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#7ab8e0">HDD Controller (HDC)</text>
  <text x="672" y="214" text-anchor="middle" font-size="10" fill="#8899aa">Command decode, error correction</text>

  <!-- arrow -->
  <line x1="672" y1="220" x2="672" y2="252" stroke="#7ab8e0" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Cache Buffer -->
  <rect x="572" y="252" width="200" height="40" rx="6" fill="#0d2035" stroke="#5bc8ac" stroke-width="2"/>
  <text x="672" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#5bc8ac">Cache Buffer (DRAM)</text>
  <text x="672" y="286" text-anchor="middle" font-size="10" fill="#8899aa">8–256 MB read/write buffer</text>

  <!-- arrow -->
  <line x1="672" y1="292" x2="672" y2="322" stroke="#5bc8ac" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Read/Write Channel -->
  <rect x="572" y="322" width="200" height="40" rx="6" fill="#0d2035" stroke="#e0a050" stroke-width="2"/>
  <text x="672" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a050">Read/Write Channel</text>
  <text x="672" y="356" text-anchor="middle" font-size="10" fill="#8899aa">Signal processing, PRML</text>

  <!-- arrow -->
  <line x1="672" y1="362" x2="672" y2="392" stroke="#e0a050" stroke-width="2" marker-end="url(#arr4)"/>

  <!-- Voice Coil / Spindle Motor -->
  <rect x="562" y="392" width="100" height="40" rx="6" fill="#0d2035" stroke="#cc8844" stroke-width="2"/>
  <text x="612" y="410" text-anchor="middle" font-size="11" fill="#cc8844">Voice Coil</text>
  <text x="612" y="424" text-anchor="middle" font-size="11" fill="#cc8844">Motor Driver</text>

  <rect x="682" y="392" width="100" height="40" rx="6" fill="#0d2035" stroke="#cc8844" stroke-width="2"/>
  <text x="732" y="410" text-anchor="middle" font-size="11" fill="#cc8844">Spindle</text>
  <text x="732" y="424" text-anchor="middle" font-size="11" fill="#cc8844">Motor Driver</text>

  <!-- arrow -->
  <line x1="612" y1="432" x2="612" y2="462" stroke="#cc8844" stroke-width="2" marker-end="url(#arr5)"/>
  <line x1="732" y1="432" x2="732" y2="462" stroke="#cc8844" stroke-width="2" marker-end="url(#arr5)"/>

  <!-- Magnetic Platters -->
  <rect x="562" y="462" width="220" height="40" rx="6" fill="#112233" stroke="#4a80b0" stroke-width="2"/>
  <text x="672" y="482" text-anchor="middle" font-size="13" font-weight="600" fill="#4a80b0">Magnetic Platters</text>
  <text x="672" y="496" text-anchor="middle" font-size="10" fill="#8899aa">R/W heads, tracks, sectors, cylinders</text>

  <!-- Power Management -->
  <rect x="572" y="530" width="200" height="32" rx="6" fill="#0d2035" stroke="#556677" stroke-width="1.5"/>
  <text x="672" y="550" text-anchor="middle" font-size="12" fill="#778899">Power Management Unit</text>

  <!-- arrowhead markers -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#60c6ff"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7ab8e0"/>
    </marker>
    <marker id="arr3" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5bc8ac"/>
    </marker>
    <marker id="arr4" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e0a050"/>
    </marker>
    <marker id="arr5" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#cc8844"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="460" y1="75" x2="460" y2="590" stroke="#2a3f55" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Bottom legend -->
  <text x="450" y="610" text-anchor="middle" font-size="11" fill="#445566">© Storage Architecture Reference — HDD</text>
</svg>
